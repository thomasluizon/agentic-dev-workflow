name: genericity-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: core/ + engine adapters must contain no project-specific strings
        run: node scripts/check-genericity.mjs
      - name: dual-target hook engine proof (logic core + vendored CC hook + opencode plugin)
        run: node scripts/test-hook-engine.mjs
      - name: setup-harness machinery proof (detect / commands / discovery / questions / answers / trackers / docs)
        run: node scripts/test-setup.mjs
      - name: setup-harness generate proof (decode / gate / generate / adopt / manifest / self-verify)
        run: node scripts/test-generate.mjs
      - name: pipeline wiring proof (skills read config.*, no hardcoded tracker / trailer / merge / branch prefix)
        run: node scripts/test-wiring.mjs
      - name: bootstrap + lifecycle proof (global install / manifest / hooks-wiring / sync preserves hand-edits)
        run: node scripts/test-bootstrap.mjs
      - name: skill/agent adapters are in sync with the manifest
        run: |
          node scripts/gen-adapters.mjs
          git diff --exit-code -- adapters || (echo "adapters/ is stale — run node scripts/gen-adapters.mjs and commit" && exit 1)
