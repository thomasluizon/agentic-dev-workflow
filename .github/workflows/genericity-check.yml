name: genericity-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-genericity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: core/ must contain no project-specific strings
        run: node scripts/check-genericity.mjs
